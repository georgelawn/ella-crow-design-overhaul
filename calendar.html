<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Ella Crow | Calendar</title>
    <link rel="stylesheet" href="styles.css?v=41">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Ella Crow Management</p>
        <h1>Calendar</h1>
      </div>
      <details class="nav-menu">
        <summary class="ghost-button nav-menu-button" aria-label="Open navigation menu">
          <span class="menu-icon" aria-hidden="true"></span>
          <span>Menu</span>
        </summary>
        <div class="header-actions">
          <a class="ghost-button nav-link" href="index.html">Gigs</a>
          <a class="ghost-button nav-link active" href="calendar.html">Calendar</a>
          <a class="ghost-button nav-link" href="sessions.html">Sessions</a>
          <a class="ghost-button nav-link" href="finance.html">Finance</a>
          <a class="ghost-button nav-link" href="projects.html">Projects</a>
          <a class="ghost-button nav-link" href="todos.html">To Do</a>
          <a class="ghost-button nav-link" href="opportunities.html">Opportunities</a>
          <a class="ghost-button nav-link" href="social.html">Social</a>
          <a class="ghost-button nav-link" href="contacts.html">Contacts</a>
        </div>
      </details>
    </header>

    <main class="shell">
      <section class="calendar-shell">
        <div class="board-toolbar">
          <button class="ghost-button" id="prevMonth" type="button">Previous</button>
          <div>
            <p class="eyebrow">Upcoming activity</p>
            <h2 id="calendarTitle">Month</h2>
          </div>
          <button class="ghost-button" id="nextMonth" type="button">Next</button>
        </div>
        <div class="calendar-weekdays">
          <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>
      <section class="gig-board calendar-detail" aria-label="Selected date">
        <p class="eyebrow">Selected date</p>
        <h2 id="selectedDateTitle">Choose a date</h2>
        <div id="selectedDateEvents"></div>
      </section>
    </main>

    <script src="cloud-config.js?v=3"></script>
    <script src="app-cloud.js?v=4"></script>
    <script src="dashboard-command.js?v=1"></script>
    <script src="mobile-panels.js?v=5"></script>
    <script src="calendar.js"></script>
  </body>
</html>
