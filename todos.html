<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Ella Crow | To Do</title>
    <link rel="stylesheet" href="styles.css?v=28">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Ella Crow Management</p>
        <h1>To Do</h1>
      </div>
      <details class="nav-menu">
        <summary class="ghost-button nav-menu-button" aria-label="Open navigation menu">
          <span class="menu-icon" aria-hidden="true"></span>
          <span>Menu</span>
        </summary>
        <div class="header-actions">
          <a class="ghost-button nav-link" href="index.html">Gigs</a>
          <a class="ghost-button nav-link" href="calendar.html">Calendar</a>
          <a class="ghost-button nav-link" href="sessions.html">Sessions</a>
          <a class="ghost-button nav-link" href="finance.html">Finance</a>
          <a class="ghost-button nav-link" href="projects.html">Projects</a>
          <a class="ghost-button nav-link active" href="todos.html">To Do</a>
          <a class="ghost-button nav-link" href="opportunities.html">Opportunities</a>
          <a class="ghost-button nav-link" href="social.html">Social</a>
          <a class="ghost-button nav-link" href="contacts.html">Contacts</a>
        </div>
      </details>
    </header>

    <main class="shell">
      <section class="summary-grid" aria-label="To do summary">
        <article>
          <span id="openCount">0</span>
          <p>Open tasks</p>
        </article>
        <article>
          <span id="breachCount">0</span>
          <p>Due</p>
        </article>
        <article>
          <span id="autoCount">0</span>
          <p>Auto tasks</p>
        </article>
        <article>
          <span id="doneCount">0</span>
          <p>Completed</p>
        </article>
      </section>

      <section class="workspace">
        <aside class="control-panel" aria-label="Add to do">
          <form id="todoForm" autocomplete="off">
            <div class="panel-heading">
              <p class="eyebrow">New Task</p>
              <h2>Add to do</h2>
            </div>

            <label>
              Category
              <select id="category" name="category">
                <option value="Gigs">Gigs</option>
                <option value="Sessions">Sessions</option>
                <option value="Finance">Finance</option>
                <option value="Opportunities">Opportunities</option>
              </select>
            </label>

            <label>
              Task
              <input id="todoTitle" name="todoTitle" required placeholder="e.g. Chase venue advance">
            </label>

            <label>
              Due date
              <input id="todoDueDate" name="todoDueDate" type="date" required>
            </label>

            <label>
              Notes
              <textarea id="todoNotes" name="todoNotes" rows="4" placeholder="Useful detail, links, context"></textarea>
            </label>

            <div class="form-actions">
              <button class="primary-button" type="submit">Save task</button>
              <button class="ghost-button" id="clearTodoButton" type="button">Clear</button>
            </div>
          </form>
        </aside>

        <section class="gig-board" aria-label="To do list">
          <div class="board-toolbar">
            <div>
              <p class="eyebrow">Categories</p>
              <h2>To do list</h2>
            </div>
            <div class="filters" role="group" aria-label="Filter tasks">
              <button class="filter active" data-filter="open" type="button">Open</button>
              <button class="filter" data-filter="breach" type="button">Due</button>
              <button class="filter" data-filter="done" type="button">Done</button>
              <button class="filter" data-filter="all" type="button">All</button>
            </div>
          </div>

          <div class="todo-list" id="todoList"></div>
          <p class="empty-state" id="todoEmptyState">No tasks here yet.</p>
        </section>
      </section>
    </main>

    <script src="cloud-config.js?v=3"></script>
    <script src="app-cloud.js?v=6"></script>
    <script src="mobile-panels.js?v=3"></script>
    <script src="todos.js?v=11"></script>
  </body>
</html>
