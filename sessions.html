<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Ella Crow | Rehearsals & Sessions</title>
    <link rel="stylesheet" href="styles.css?v=40">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Ella Crow Management</p>
        <h1>Sessions</h1>
      </div>
      <details class="nav-menu">
        <summary class="ghost-button nav-menu-button" aria-label="Open navigation menu">
          <span class="menu-icon" aria-hidden="true"></span>
          <span>Menu</span>
        </summary>
        <div class="header-actions">
          <a class="ghost-button nav-link" href="index.html">Gigs</a>
          <a class="ghost-button nav-link" href="calendar.html">Calendar</a>
          <a class="ghost-button nav-link active" href="sessions.html">Sessions</a>
          <a class="ghost-button nav-link" href="finance.html">Finance</a>
          <a class="ghost-button nav-link" href="projects.html">Projects</a>
          <a class="ghost-button nav-link" href="todos.html">To Do</a>
          <a class="ghost-button nav-link" href="opportunities.html">Opportunities</a>
          <a class="ghost-button nav-link" href="social.html">Social</a>
          <a class="ghost-button nav-link" href="contacts.html">Contacts</a>
        </div>
      </details>
    </header>

    <main class="shell">
      <section class="summary-grid" aria-label="Session summary">
        <article><span id="upcomingSessionCount">0</span><p>Upcoming</p></article>
        <article><span id="pendingSessionCount">0</span><p>TBC</p></article>
        <article><span id="rehearsalCount">0</span><p>Rehearsals</p></article>
        <article><span id="recordingCount">0</span><p>Recording</p></article>
        <article><span id="meetingCount">0</span><p>Meetings</p></article>
      </section>

      <section class="workspace">
        <aside class="control-panel" aria-label="Session controls">
          <form id="sessionForm" autocomplete="off">
            <input id="sessionId" type="hidden">
            <div class="panel-heading">
              <p class="eyebrow">Schedule</p>
              <h2 id="sessionFormTitle">Add session</h2>
            </div>

            <label>
              Type
              <select id="sessionType">
                <option value="Rehearsal">Rehearsal</option>
                <option value="Recording">Recording</option>
                <option value="Meeting">Meeting</option>
              </select>
            </label>

            <label>
              Title
              <input id="sessionTitle" required placeholder="e.g. Band rehearsal">
            </label>

            <div class="field-row">
              <label>
                Date
                <input id="sessionDate" type="date" required>
              </label>
              <label>
                Time
                <input id="sessionTime" type="time">
              </label>
            </div>

            <label>
              Location / studio
              <input id="sessionLocation" placeholder="Studio, room, address">
            </label>

            <div class="field-row">
              <label>
                Status
                <select id="sessionStatus">
                  <option value="booked">Booked</option>
                  <option value="pending">TBC</option>
                  <option value="complete">Complete</option>
                </select>
              </label>
              <label>
                Cost
                <input id="sessionCost" type="number" min="0" step="0.01" placeholder="0">
              </label>
            </div>

            <label>
              Notes
              <textarea id="sessionNotes" rows="4" placeholder="Songs, aims, setup, follow-ups"></textarea>
            </label>

            <div class="form-actions">
              <button class="primary-button" type="submit">Save session</button>
              <button class="ghost-button" id="clearSessionButton" type="button">Clear</button>
            </div>
          </form>
        </aside>

        <section class="gig-board" aria-label="All sessions">
          <div class="board-toolbar">
            <div>
              <p class="eyebrow">Live Schedule</p>
              <h2>Rehearsals & recording</h2>
            </div>
            <div class="filters" role="group" aria-label="Filter sessions">
              <button class="filter active" data-filter="all" type="button">All</button>
              <button class="filter" data-filter="Rehearsal" type="button">Rehearsals</button>
              <button class="filter" data-filter="Recording" type="button">Recording</button>
              <button class="filter" data-filter="Meeting" type="button">Meetings</button>
              <button class="filter" data-filter="pending" type="button">TBC</button>
            </div>
          </div>
          <div class="calendar-sync-panel">
            <span id="calendarSyncStatus">Google Calendar sync idle</span>
            <button class="small-button" id="syncExistingSessionsButton" type="button">Sync existing to Google</button>
          </div>
          <div class="gig-list" id="sessionList"></div>
          <p class="empty-state" id="sessionEmptyState">No rehearsals or sessions yet.</p>
        </section>
      </section>
    </main>

    <script src="cloud-config.js?v=3"></script>
    <script src="app-cloud.js?v=4"></script>
    <script src="mobile-panels.js?v=4"></script>
    <script src="google-calendar-sync.js?v=4"></script>
    <script src="finance-source-sync.js?v=1"></script>
    <script src="sessions.js?v=10"></script>
  </body>
</html>
